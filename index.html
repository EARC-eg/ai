        .input-bar { background: var(--bg-primary); border-top: 1px solid var(--border-subtle); padding: 6px 10px max(10px, env(safe-area-inset-bottom)) 10px; position: fixed; bottom: 0; width: 100%; z-index: 100; }

    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getDatabase, ref, get, set, push, query, limitToLast } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    
    window.EACR_DB = database;
    window.EACR_DB_REF = ref;
    window.EACR_DB_GET = get;
    window.EACR_DB_SET = set;
    window.EACR_DB_PUSH = push;
    window.EACR_DB_QUERY = query;
    window.EACR_DB_LIMIT = limitToLast;
    
    window.AUTH_SYSTEM = {
        db: database,
        currentUser: null,
        
        saveSession(userData) {
            const session = {
                userId: userData.userId,
                email: userData.email,
                name: userData.name,
                picture: userData.picture || '',
                loginTime: Date.now(),
                provider: userData.provider || 'email'
            };
            localStorage.setItem('eacr_user_session', JSON.stringify(session));
            this.currentUser = session;
        },
        
        restoreSession() {
            try {
                const session = localStorage.getItem('eacr_user_session');
                if (session) {
                    const data = JSON.parse(session);
                    if (Date.now() - data.loginTime < 30 * 24 * 60 * 60 * 1000) {
                        this.currentUser = data;
                        return data;
                    }
                }
            } catch(e) {}
            return null;
        },
        
        clearSession() {
            localStorage.removeItem('eacr_user_session');
            this.currentUser = null;
        },
        
        async findUserByEmail(email) {
            const snap = await get(ref(this.db, 'users'));
            if (!snap.exists()) return null;
            const users = snap.val();
            for (const key in users) {
                if (users[key].email === email) return { id: key, ...users[key] };
            }
            return null;
        },
        
        async register(name, email, password, provider = 'email', picture = '') {
            try {
                const existing = await this.findUserByEmail(email);
                if (existing) return { success: false, error: 'البريد مسجل بالفعل' };
                
                const newRef = push(ref(this.db, 'users'));
                const userId = newRef.key;
                const hashed = password ? await this.hashPassword(password) : '';
                
                const userData = {
                    userId, name: name || email.split('@')[0], email,
                    password: hashed, provider, picture,
                    createdAt: Date.now(), lastLogin: Date.now(),
                    totalSessions: 0, totalMessages: 0
                };
                
                await set(newRef, userData);
                const sessionData = { userId, email, name: userData.name, picture, provider };
                this.saveSession(sessionData);
                return { success: true, user: sessionData };
            } catch(e) {
                return { success: false, error: 'حدث خطأ' };
            }
        },
        
        async login(email, password) {
            try {
                const user = await this.findUserByEmail(email);
                if (!user) return { success: false, error: 'البريد غير مسجل' };
                if (user.provider === 'google' && !user.password) return { success: false, error: 'استخدم زر Google' };
                
                const hashed = await this.hashPassword(password);
                if (user.password !== hashed) return { success: false, error: 'كلمة مرور خاطئة' };
                
                await set(ref(this.db, `users/${user.id}/lastLogin`), Date.now());
                const sessionData = { userId: user.userId, email: user.email, name: user.name, picture: user.picture || '', provider: 'email' };
                this.saveSession(sessionData);
                return { success: true, user: sessionData };
            } catch(e) {
                return { success: false, error: 'حدث خطأ' };
            }
        },
        
        async handleGoogleUser(googleData) {
            const { email, name, picture } = googleData;
            const existing = await this.findUserByEmail(email);
            
            if (existing) {
                await set(ref(this.db, `users/${existing.id}/lastLogin`), Date.now());
                if (picture) await set(ref(this.db, `users/${existing.id}/picture`), picture);
                const sessionData = { userId: existing.userId, email, name: existing.name, picture: picture || existing.picture || '', provider: 'google' };
                this.saveSession(sessionData);
                return { success: true, user: sessionData, isNew: false };
            } else {
                const result = await this.register(name, email, '', 'google', picture);
                if (result.success) result.isNew = true;
                return result;
            }
        },
        
        logout() { this.clearSession(); return true; },
        
        async hashPassword(pw) {
            if (!pw) return '';
            const data = new TextEncoder().encode(pw + 'eacr_salt');
            const hash = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        },
        
        getDeviceId() {
            let id = localStorage.getItem('eacr_device_id');
            if (!id) {
                id = 'dev_' + Date.now().toString(36) + Math.random().toString(36).substr(2, 4);
                localStorage.setItem('eacr_device_id', id);
            }
            return id;
        },
        
        isLoggedIn() { return this.currentUser !== null; },
        getUserId() { return this.currentUser ? this.currentUser.userId : null; }
    };
    
    window.MEMORY_SYSTEM = {
        db: database, currentSessionId: null,
        
        getUserId() { return window.AUTH_SYSTEM.getUserId() || window.AUTH_SYSTEM.getDeviceId(); },
        getUserPath() { const uid = this.getUserId(); return window.AUTH_SYSTEM.isLoggedIn() ? `users/${uid}/conversations` : `devices/${uid}/conversations`; },
        
        async createSession(title) {
            const ref = push(ref(this.db, this.getUserPath()));
            this.currentSessionId = ref.key;
            await set(ref, { title: title||'محادثة', createdAt: Date.now(), updatedAt: Date.now(), messageCount: 0 });
            return this.currentSessionId;
        },
        
        async saveMessage(role, content) {
            if (!this.currentSessionId) await this.createSession(content.substring(0,50));
            const ref = push(ref(this.db, `${this.getUserPath()}/${this.currentSessionId}/messages`));
            await set(ref, { role, content: content.substring(0,3000), timestamp: Date.now() });
        },
        
        async loadSessions() {
            const snap = await get(ref(this.db, this.getUserPath()));
            if (!snap.exists()) return [];
            const sessions = [];
            snap.forEach(c => { const v = c.val(); sessions.push({ id: c.key, title: v.title||'محادثة', createdAt: v.createdAt||0, updatedAt: v.updatedAt||0, messageCount: v.messageCount||0 }); });
            return sessions.sort((a,b) => (b.updatedAt||b.createdAt||0) - (a.updatedAt||a.createdAt||0));
        },
        
        async loadSessionMessages(sid) {
            const snap = await get(query(ref(this.db, `${this.getUserPath()}/${sid}/messages`), limitToLast(50)));
            if (!snap.exists()) return [];
            const msgs = [];
            snap.forEach(c => msgs.push(c.val()));
            return msgs.sort((a,b) => (a.timestamp||0) - (b.timestamp||0));
        }
    };
    
    window.AUTH_SYSTEM.restoreSession();
    window.dispatchEvent(new Event('firebaseReady'));
</script>

        });

function closeAuthModal(e) {
    if (!e || e.target === authOverlay) {
        authOverlay.classList.remove('show');
        document.querySelectorAll('.auth-error').forEach(el => el.classList.remove('show'));
    }
}

function switchAuthTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
    document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
}

async function login() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const err = document.getElementById('loginError');
    if (!email || !password) { err.textContent = 'أدخل البريد وكلمة المرور'; err.classList.add('show'); return; }
    const btn = document.getElementById('loginBtn'); btn.disabled = true; btn.textContent = 'جاري...';
    const r = await window.AUTH_SYSTEM.login(email, password);
    if (r.success) { authOverlay.classList.remove('show'); updateUI(r.user); clearFields(); loadSessions(); showSuccess('تم الدخول'); }
    else { err.textContent = r.error; err.classList.add('show'); }
    btn.disabled = false; btn.textContent = 'تسجيل الدخول';
}

async function register() {
    const name = document.getElementById('registerName').value.trim();
    const email = document.getElementById('registerEmail').value.trim();
    const password = document.getElementById('registerPassword').value;
    const err = document.getElementById('registerError');
    if (!name || !email || !password) { err.textContent = 'املأ الحقول'; err.classList.add('show'); return; }
    if (password.length < 6) { err.textContent = '6 أحرف على الأقل'; err.classList.add('show'); return; }
    const btn = document.getElementById('registerBtn'); btn.disabled = true; btn.textContent = 'جاري...';
    const r = await window.AUTH_SYSTEM.register(name, email, password);
    if (r.success) { authOverlay.classList.remove('show'); updateUI(r.user); clearFields(); loadSessions(); showSuccess('تم الإنشاء'); }
    else { err.textContent = r.error; err.classList.add('show'); }
    btn.disabled = false; btn.textContent = 'إنشاء حساب';
}

function logout() { window.AUTH_SYSTEM.logout(); updateUIForLoggedOut(); dropdownMenu.classList.remove('show'); }
function clearFields() { document.querySelectorAll('.input-field').forEach(f => f.value = ''); }

function updateUI(user) {
    const btn = document.getElementById('userBtn');
    btn.classList.add('logged-in');
    if (user.picture) {
        btn.innerHTML = `<img src="${user.picture}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
    } else {
        btn.innerHTML = `<span style="font-size:12px;font-weight:700;color:var(--accent-primary);">${user.name.charAt(0)}</span>`;
    }
    btn.title = user.name;
    document.getElementById('dropdownLoginItem').style.display = 'none';
    document.getElementById('dropdownLogoutItem').style.display = 'flex';
    document.getElementById('dropdownDividerLogin').style.display = 'block';
}

function updateUIForLoggedOut() {
    const btn = document.getElementById('userBtn');
    btn.classList.remove('logged-in');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;
    btn.title = 'تسجيل الدخول';
    document.getElementById('dropdownLoginItem').style.display = 'flex';
    document.getElementById('dropdownLogoutItem').style.display = 'none';
    document.getElementById('dropdownDividerLogin').style.display = 'none';
}

function showSuccess(msg) {
    const w = document.createElement('div'); w.className = 'msg-ai';
    w.innerHTML = `<div class="msg-ai-bubble" style="background:#ecfdf5;border-color:#a7f3d0;"><div class="msg-ai-content" style="color:#059669;">✅ ${msg}</div></div>`;
    chatArea.insertBefore(w, typingIndicator);
}

async function loadSessions() {
    if (window.MEMORY_SYSTEM) {
        try { document.getElementById('sessionCount').textContent = (await window.MEMORY_SYSTEM.loadSessions()).length; } catch(e) {}
    }
}

chatArea.addEventListener('scroll', () => {
    const st = chatArea.scrollTop, sh = chatArea.scrollHeight, ch = chatArea.clientHeight;
    if (st > lastScroll && st > 100 && (sh - st - ch > 60)) {
        floatingToolbar.style.opacity = '0.4'; floatingToolbar.style.transform = 'translateX(-50%) translateY(20px) scale(0.95)';
    } else {
        floatingToolbar.style.opacity = '1'; floatingToolbar.style.transform = 'translateX(-50%) translateY(0) scale(1)';
    }
    lastScroll = st;
});

function getSystemPrompt(l) { 
    return l==='ar' ? `أنت "${PROFESSOR_NAME}"، ${PROFESSOR_TITLE} و${PROFESSOR_HONOR}. أنت خبير في علم المناعة وأبحاث السرطان.` : `You are "${PROFESSOR_NAME}", Professor of Immunology at Tanta University and President of the Egyptian Association for Cancer Research.`; 
}
function detectLanguage(t) { return (t.match(/[\u0600-\u06FF]/g)||[]).length >= (t.match(/[a-zA-Z]/g)||[]).length ? 'ar' : 'en'; }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function appendMessage(text, isUser) {
    messageCount++;
    const w = document.createElement('div');
    if (isUser) {
        w.className = 'msg-user'; w.innerHTML = `<div class="msg-user-bubble">${esc(text)}</div>`;
    } else {
        w.className = 'msg-ai';
        w.innerHTML = `<img src="${PROFESSOR_AVATAR}" class="msg-ai-avatar"><div class="msg-ai-bubble"><div class="msg-ai-content">${text.replace(/\n/g,'<br>')}</div><div class="msg-ai-meta"><span>${PROFESSOR_NAME}</span><span>•</span><span>${new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})}</span></div></div>`;
    }
    chatArea.insertBefore(w, typingIndicator);
    chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' });
}

// دالة زر الواتساب الاحترافية

}

        <div class="welcome-card">

async function processChat() {
    const msg = userInput.value.trim();
    if (!msg) return;
    
    // التحقق من اللغة - منع الحروف غير العربية والإنجليزية
    if (!isValidLanguage(msg)) {
        appendMessage("⚠️ عذراً، يُسمح فقط باللغة العربية والإنجليزية. يرجى كتابة سؤالك بهاتين اللغتين فقط.", false);
        userInput.value = '';
        userInput.focus();
        return;
    }
    
    appendMessage(msg, true);
    userInput.value = '';
    conversationHistory.push({role:"user",content:msg});
    sendButton.disabled = true;
    typingIndicator.style.display = 'flex';
    try {
        const res = await fetch(API_URL,{
            method:"POST",
            headers:{"Authorization":`Bearer ${API_KEY}`,"Content-Type":"application/json"},
            body:JSON.stringify({model:"llama-3.3-70b-versatile",messages:conversationHistory,temperature:0.5,max_tokens:2000})
        });
        const reply = (await res.json()).choices[0].message.content;
        conversationHistory.push({role:"assistant",content:reply});
        typingIndicator.style.display = 'none';
        appendMessage(reply,false);
    } catch(e) {
        typingIndicator.style.display = 'none';
        appendMessage("⚠️ عذراً، حدث خطأ في الاتصال. يرجى المحاولة مرة أخرى.", false);
    } finally {
        sendButton.disabled = false;
        userInput.focus();
    }
}

function handleTool(t) {
    const q = { analyze:'ما هي أساسيات علم المناعة؟', cells:'اشرح أنواع خلايا المناعة.', diseases:'ما هي أمراض المناعة الذاتية؟', therapy:'ما هي احدث الابحاث في العلاجات المناعية ؟', textbooks:'ما هي أفضل الكتب في المناعة؟', conference:'ما هي أحدث أبحاث السرطان؟' };
    userInput.value = q[t]||''; userInput.focus();
}

function toggleDropdown() { dropdownMenu.classList.toggle('show'); }

async function newChat() {
    dropdownMenu.classList.remove('show');
    chatArea.querySelectorAll('.msg-ai, .msg-user').forEach(e=>e.remove());
    conversationHistory = [{role:"system",content:getSystemPrompt(currentLanguage)}]; messageCount = 0;
    showWelcomeMessage();
}

async function showSessions() {
    dropdownMenu.classList.remove('show'); sessionsModal.classList.add('show');
    if (window.MEMORY_SYSTEM) {
        const s = await window.MEMORY_SYSTEM.loadSessions();
        document.getElementById('sessionsList').innerHTML = s.length ? s.map(s=>`<div class="session-item" onclick="loadSession('${s.id}')"><div class="session-info"><div class="session-title">${esc(s.title)}</div><div class="session-meta">${new Date(s.createdAt).toLocaleDateString('ar-EG')} • ${s.messageCount} رسالة</div></div></div>`).join('') : '<div class="session-empty">لا توجد</div>';
    }
}

async function loadSession(id) {
    sessionsModal.classList.remove('show');
    chatArea.querySelectorAll('.msg-ai, .msg-user').forEach(e=>e.remove());
    const msgs = await window.MEMORY_SYSTEM.loadSessionMessages(id);
    window.MEMORY_SYSTEM.currentSessionId = id;
    conversationHistory = [{role:"system",content:getSystemPrompt(currentLanguage)}]; messageCount = 0;
    msgs.forEach(m=>{appendMessage(m.content,m.role==='user');conversationHistory.push({role:m.role,content:m.content});});
}

function closeSessions(e) { if(e.target===sessionsModal) sessionsModal.classList.remove('show'); }
document.addEventListener('click',(e)=>{if(!e.target.closest('.pen-btn-wrapper')&&!e.target.closest('.header-actions')) dropdownMenu.classList.remove('show');});

async function init() {
    conversationHistory = [{role:"system",content:getSystemPrompt('ar')}];
    const s = window.AUTH_SYSTEM.restoreSession();
    if (s) updateUI(s);
    await loadSessions();
    showWelcomeMessage();
    userInput.focus();
}

window.addEventListener('firebaseReady',()=>setTimeout(init,500));
sendButton.addEventListener('click',processChat);
userInput.addEventListener('keypress',(e)=>{if(e.key==='Enter'){e.preventDefault();processChat();}});
setTimeout(()=>{if(!window.EACR_DB) init();},2500);
</script>
