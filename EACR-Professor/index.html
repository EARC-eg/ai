<body>

<div id="g_id_onload"
     data-client_id="1077378702730-1kmvnj5bjksca76puve8qvatoigt7ngf.apps.googleusercontent.com"

     data-callback="handleGoogleSignIn"
     data-auto_select="false"
     data-itp_support="true">
</div>

<!-- Floating Header -->
<header class="floating-header">
    <div class="header-brand">
        <div class="logo-wrapper">
            <img src="https://i.ibb.co/nqjSTBjJ/Whats-App-Image-2026-05-14-at-10-58-27-PM.jpg" alt="أ.د محمد لبيب سالم" class="logo-img">
        </div>
        <div class="brand-text">
            <h1>أ.د محمد لبيب سالم</h1>
        </div>
    </div>
    <div class="header-divider"></div>
    <div class="header-actions">
        <button class="user-btn" id="userBtn" onclick="window.toggleAuthModal?.()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
        <div class="pen-btn-wrapper">
            <button class="pen-btn-header" id="dropdownToggleBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            </button>
            <div class="dropdown-menu" id="dropdownMenu">
                <div class="dropdown-item" id="newChatBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                    <span class="item-text">محادثة جديدة</span>
                </div>
                <div class="dropdown-item" id="showSessionsBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    <span class="item-text">المحادثات السابقة</span>
                    <span class="item-badge" id="sessionCount">0</span>
                </div>
                <div class="dropdown-divider" id="dropdownDividerLogin"></div>
                <div class="dropdown-item" id="dropdownLoginItem">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <span class="item-text">تسجيل الدخول</span>
                </div>
                <div class="dropdown-item danger" id="dropdownLogoutItem" style="display:none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    <span class="item-text">تسجيل الخروج</span>
                </div>
            </div>
        </div>
    </div>
</header>

<!-- Auth Modal -->
<div class="auth-overlay" id="authOverlay" onclick="closeAuthModal(event)">
    <div class="auth-card" onclick="event.stopPropagation()">
        <button class="auth-close" onclick="closeAuthModal()">✕</button>
        <div class="auth-title">تسجيل الدخول</div>
        <div class="auth-subtitle">سجل دخولك لحفظ محادثاتك مع أ.د محمد لبيب سالم</div>
        
        <div class="google-btn-container">
            <button class="google-signin-btn" id="googleSignInBtn">
                <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                <span>المتابعة باستخدام Google</span>
            </button>
        </div>
        
        <div class="auth-divider">أو بالبريد</div>
        
        <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">دخول</button>
            <button class="auth-tab" data-tab="register">جديد</button>
        </div>
        
        <div class="auth-form" id="loginForm">
            <div class="input-group">
                <label class="input-label">البريد الإلكتروني</label>
                <input type="email" class="input-field" id="loginEmail" placeholder="example@email.com">
            </div>
            <div class="input-group">
                <label class="input-label">كلمة المرور</label>
                <input type="password" class="input-field" id="loginPassword" placeholder="••••••••">
            </div>
            <div class="auth-error" id="loginError"></div>
            <button class="auth-btn" id="loginBtn">تسجيل الدخول</button>
        </div>
        
        <div class="auth-form hidden" id="registerForm">
            <div class="input-group">
                <label class="input-label">الاسم</label>
                <input type="text" class="input-field" id="registerName" placeholder="الاسم الكامل">
            </div>
            <div class="input-group">
                <label class="input-label">البريد الإلكتروني</label>
                <input type="email" class="input-field" id="registerEmail" placeholder="example@email.com">
            </div>
            <div class="input-group">
                <label class="input-label">كلمة المرور</label>
                <input type="password" class="input-field" id="registerPassword" placeholder="••••••••">
            </div>
            <div class="auth-error" id="registerError"></div>
            <button class="auth-btn" id="registerBtn">إنشاء حساب</button>
        </div>
    </div>
</div>

<!-- Floating Toolbar -->
<div class="floating-toolbar" id="floatingToolbar">
    <button class="floating-tool-btn" data-tool="analyze"><svg class="tool-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg><span class="tool-label">تحليل مناعي</span></button>
    <button class="floating-tool-btn" data-tool="cells"><svg class="tool-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span class="tool-label">خلايا المناعة</span></button>
    <button class="floating-tool-btn" data-tool="diseases"><svg class="tool-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="tool-label">أمراض المناعة</span></button>
    <button class="floating-tool-btn" data-tool="therapy"><svg class="tool-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg><span class="tool-label">علاجات مناعية</span></button>
    <button class="floating-tool-btn" data-tool="textbooks"><svg class="tool-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg><span class="tool-label">مراجع علمية</span></button>
    <button class="floating-tool-btn" data-tool="conference"><svg class="tool-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span class="tool-label">أبحاث السرطان</span></button>
</div>

<!-- Chat Area -->
<div class="chat-area" id="chatArea">
    <div id="typing"><span id="typingText">يكتب...</span><div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>
</div>

<div class="input-bar">
    <div class="input-inner">
        <div class="input-wrapper">
            <span class="input-prefix">❯</span>
            <input type="text" id="userInput" placeholder="اسأل أ.د محمد لبيب سالم عن المناعة وأبحاث السرطان..." autocomplete="off" enterkeyhint="send">
        </div>
        <button class="send-btn" id="sendBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
    </div>
</div>

<div class="modal-overlay" id="sessionsModal" onclick="closeSessions(event)">
    <div class="modal-sheet" onclick="event.stopPropagation()">
        <div class="modal-handle"></div>
        <div class="modal-title">المحادثات السابقة مع أ.د محمد لبيب سالم</div>
        <div id="sessionsList"><div class="session-empty">لا توجد محادثات</div></div>
    </div>
</div>

<!-- Scripts -->
<script type="module" src="js/main.js"></script>
